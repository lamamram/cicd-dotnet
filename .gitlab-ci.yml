image: "$CI_REGISTRY_IMAGE/dotnet-sdk:6.0"

stages:
  - builds
  - tests
  - deploys

build:
  stage: builds
  script:
    # installation d'une dépendance projet
    - mkdir packages
    - echo "package content" > packages/package
  # prélčvement du dossier packages comme cache
  cache:
    key: packages
    paths:
      - packages/
    policy: push

test:
  stage: tests
  script:
    # utilisation du cache "packages"
    - test -e packages/package
  cache:
    key: packages
    # le cache est non versionné ==> !! git clean
    untracked: true
    policy: pull