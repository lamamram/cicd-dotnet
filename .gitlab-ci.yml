image: "$CI_REGISTRY_IMAGE/dotnet-sdk:6.0"

workflow:
  # règles d'exécution du pipeline
  # le pipeline s'exécutera si au moins une règle est vraie
  # OU logique
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - builds
  - tests
  - deploys

build:
  stage: builds
  before_script:
    - dotnet restore
  script:
    - dotnet build --no-restore

test:
  stage: tests
  script:
    - echo "Test"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    # les Merge_Request n'appartiennent à aucune branche
    # le jobs intéréssants pour une MR doivent être selectionnés
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test_features:
  stage: tests
  script:
    - echo "Test Feature1"
  rules:
    # une règle est vraie si toutes ses clauses le sont
    # ET logique
    - if: $CI_COMMIT_BRANCH =~ /feature[0-9]+/
      changes:
        - "*.md"
        - ".gitlab-ci.yml"

deploy:
  stage: deploys
  script:
    - echo "Deploy"
  rules:
    - if: >
          $CI_COMMIT_BRANCH == "master" ||
          $CI_COMMIT_TAG =~ /v\d+\.\d+/  
      when: manual