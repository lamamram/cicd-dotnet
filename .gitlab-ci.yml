image: "$CI_REGISTRY_IMAGE/dotnet-sdk:6.0"

stages:
  - tests
  - builds
#  - deploys


.build:
  stage: builds
  script:
    - dotnet publish -c Release -o publish MyProject/MyProject.csproj
    - ls -al publish


test:
  stage: tests
  before_script:
    - dotnet add MyProject.Test/MyProject.Test.csproj package JUnitTestLogger --version 1.1.0
  script:
    - dotnet test --logger "junit;LogFilePath=reports/results.xml" MyProject.Test
