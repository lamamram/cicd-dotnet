image: "$CI_REGISTRY_IMAGE/dotnet-sdk:6.0"

stages:
  - builds
  - tests
  - deploys

build:
  stage: builds
  script:
    # crťation d'un artefact (rapport, composant logiciel ...)
    - mkdir build
    - echo "build content" > build/artifact
  # prťlŤvement de l'artefact
  artifacts:
    expire_in: 1 hour
    paths:
      - build/

test:
  stage: tests
  script:
    # artefact installť par gitlab-runner
    - test -e build/artifact
    - mkdir test
    - echo "build content" > test/artifact
  artifacts:
    expire_in: 1 hour
    paths:
      - test/

deploy:
  stage: deploys
  script:
    - test -e test/artifact
  # spťcifier les jobs dont les artefacts sont utiles pour le job courant
  dependencies: [build] 